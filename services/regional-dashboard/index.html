<!DOCTYPE html>
<html>
<head>
    <title>Regional Voting Dashboard</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .region-section { border: 2px solid #333; margin: 20px; padding: 15px; border-radius: 10px; }
        .results-flex { display: flex; justify-content: center; gap: 10px; }
        .candidate { border: 1px solid #ccc; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Resultados Regionales en Vivo</h1>
    <div id="regions-container">
        <p>Esperando datos regionales...</p>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}`);
        const container = document.getElementById('regions-container');
        const regionalData = {}; // region -> results

        ws.onmessage = (event) => {
            const { region, results } = JSON.parse(event.data);
            regionalData[region] = results;
            render();
        };

        function render() {
            container.innerHTML = '';
            for (const region in regionalData) {
                const section = document.createElement('div');
                section.className = 'region-section';
                section.innerHTML = `<h2>Región: ${region.toUpperCase()}</h2>`;
                
                const flex = document.createElement('div');
                flex.className = 'results-flex';
                
                for (const candidate in regionalData[region]) {
                    const div = document.createElement('div');
                    div.className = 'candidate';
                    div.innerHTML = `<strong>${candidate}</strong>: ${regionalData[region][candidate]}`;
                    flex.appendChild(div);
                }
                
                section.appendChild(flex);
                container.appendChild(section);
            }
        }
    </script>
</body>
</html>

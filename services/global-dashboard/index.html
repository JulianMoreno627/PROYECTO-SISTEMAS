<!DOCTYPE html>
<html>
<head>
    <title>Global Voting Dashboard</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        #results { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .candidate { border: 1px solid #ccc; padding: 20px; border-radius: 8px; min-width: 100px; }
        .count { font-size: 2em; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Resultados Globales en Vivo</h1>
    <div id="results">
        <p>Esperando datos...</p>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}`);
        const resultsDiv = document.getElementById('results');

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            resultsDiv.innerHTML = '';
            for (const candidate in data) {
                const div = document.createElement('div');
                div.className = 'candidate';
                div.innerHTML = `<h3>Candidato ${candidate}</h3><div class="count">${data[candidate]}</div>`;
                resultsDiv.appendChild(div);
            }
        };
    </script>
</body>
</html>
